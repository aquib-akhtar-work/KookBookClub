name: Build Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image owner
        id: prep
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/cookbookclub-server:main
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/cookbookclub-server:latest
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/cookbookclub-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/cookbookclub-web:main
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/cookbookclub-web:latest
            ghcr.io/${{ steps.prep.outputs.owner_lc }}/cookbookclub-web:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=http://localhost:8080
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
